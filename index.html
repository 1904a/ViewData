<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Task - Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4 text-center">Danh sách công việc</h1>
        
        <!-- Form Thêm -->
        <div class="flex mb-4">
            <input type="text" id="taskInput" placeholder="Nhập công việc..." class="flex-1 border p-2 rounded-l">
            <button onclick="addTask()" class="bg-blue-500 text-white px-4 py-2 rounded-r hover:bg-blue-600">Thêm</button>
        </div>

        <!-- Danh sách -->
        <ul id="taskList" class="space-y-2">
            <!-- Dữ liệu sẽ đổ vào đây -->
        </ul>
    </div>

    <script>
        // Cấu hình Supabase (Thay thông tin của bạn vào đây)
        const SUPABASE_URL = 'https://aybkkuhsmtzytnurpnjh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5YmtrdWhzbXR6eXRudXJwbmpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzMzNDMsImV4cCI6MjA5MDgwOTM0M30.2rojSxpGDEeapv7u1x5wJ_4ZTtdDMAD5F8_D2k6O_JI';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');

        // 1. Lấy danh sách (Read)
        async function fetchTasks() {
            const { data, error } = await supabase
                .from('tasks')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) console.error('Lỗi:', error);
            else renderTasks(data);
        }

        function renderTasks(tasks) {
            taskList.innerHTML = tasks.map(task => `
                <li class="flex justify-between items-center bg-gray-50 p-3 rounded border">
                    <span id="text-${task.id}">${task.content}</span>
                    <div class="flex gap-2">
                        <button onclick="editTask('${task.id}', '${task.content}')" class="text-yellow-600 text-sm">Sửa</button>
                        <button onclick="deleteTask('${task.id}')" class="text-red-600 text-sm">Xoá</button>
                    </div>
                </li>
            `).join('');
        }

        // 2. Thêm mới (Create)
        async function addTask() {
            const content = taskInput.value.trim();
            if (!content) return;

            const { error } = await supabase.from('tasks').insert([{ content }]);
            if (error) alert('Lỗi khi thêm!');
            else {
                taskInput.value = '';
                fetchTasks();
            }
        }

        // 3. Xoá (Delete)
        async function deleteTask(id) {
            if (confirm('Bạn có chắc muốn xoá?')) {
                const { error } = await supabase.from('tasks').delete().eq('id', id);
                if (!error) fetchTasks();
            }
        }

        // 4. Sửa (Update)
        async function editTask(id, oldContent) {
            const newContent = prompt('Sửa nội dung:', oldContent);
            if (newContent && newContent !== oldContent) {
                const { error } = await supabase
                    .from('tasks')
                    .update({ content: newContent })
                    .eq('id', id);
                if (!error) fetchTasks();
            }
        }

        // Chạy lần đầu
        fetchTasks();
    </script>
</body>
</html>
